<!DOCTYPE html>
<html lang="en">

<head>
    {% include "common_head.html" %}
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <title>Login</title>
</head>

<body>
    {% include "navbar.html" %}
    <div class="container">
        <div class="auth-wrapper">
            <h1>Login</h1>
            <form class="auth-form" method="post">
                <div class="form-group">
                    <label>
                        Email {% include "required.html" %}
			<input type="email" name="email" value="{{ request.args.get('email') or '' }}" required>
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        Password {% include "required.html" %}
                        <input type="password" name="password" required>
                    </label>
                </div>
                <button type="submit" class="btn-primary">Login</button>
                {% if request.args.get("msg") == "wrongpwd" %}
		    <p class="auth-fail-message">Wrong password</p>
		{% endif %}
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="/create_account">Create one</a></p>
            </div>
        </div>
    </div>
</body>

</html>
