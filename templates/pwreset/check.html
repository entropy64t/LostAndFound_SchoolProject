<!DOCTYPE html>
<html lang="en">

<head>
    {% include "common_head.html" %}
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <title>Reset password</title>
</head>

<body>
    <div class="container">
        <h1>Lost&amp;Found</h1>
        <div class="auth-wrapper">
            <h1>{{ lang("Reset password") }}</h1>
            <form class="auth-form" method="post">
                <div class="form-group">
                    <label>
                        {{ lang("Set a new password") }} {% include "required.html" %}
                        <input type="password" name="password" required>
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        {{ lang("Repeat password") }} {% include "required.html" %}
                        <input type="password" name="password-repeat" required>
                    </label>
                </div>
                <button type="submit" class="btn-primary">{{ lang("Reset password") }}</button>
                {% if request.args.get("msg") == "pwdnomatch" %}
                <p class="auth-fail-message">{{ lang("Passwords don't match") }}</p>
                {% endif %}
            </form>
            <div class="auth-footer">
                <p><a href="{{ url_for('login') }}">{{ lang("Return to login") }}</a></p>
            </div>
        </div>
    </div>

    {% include "footer.html" %}
</body>

</html>
